name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Show Xcode and xcstringstool versions
        run: |
          xcodebuild -version
          xcrun xcstringstool generate-symbols --help
      - name: Run tests
        run: swift test --parallel
